name: Release on version bump

on:
  push:
    branches:
      - main
    paths:
      - version/version.go
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          git fetch --tags --force

          VERSION=$(sed -nE 's/^const Version = "([^"]+)"$/\1/p' version/version.go)
          if [ -z "$VERSION" ]; then
            echo "Could not parse version from version/version.go" >&2
            exit 1
          fi

          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "create_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "create_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when tag already exists
        if: steps.version.outputs.create_release != 'true'
        run: echo "Tag ${{ steps.version.outputs.tag }} already exists. Nothing to release."

      - name: Run Go tests
        if: steps.version.outputs.create_release == 'true'
        run: go test ./...

      - name: Build Linux and Windows binaries
        if: steps.version.outputs.create_release == 'true'
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/english .
          GOOS=windows GOARCH=amd64 go build -o dist/english.exe .

      - name: Build VS Code extension package
        if: steps.version.outputs.create_release == 'true'
        working-directory: vscode-extension
        run: |
          bun install --frozen-lockfile
          bun run compile
          bun run package:vsix
          cp english-language.vsix ../dist/english-language.vsix

      - name: Create and push tag
        if: steps.version.outputs.create_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.version.outputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/english
            dist/english.exe
            dist/english-language.vsix
